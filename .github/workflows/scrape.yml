name: Scrape GST/CBIC updates and email alerts

on:
  schedule:
    # Runs every hour, on the hour (UTC). GitHub's scheduler can lag a few
    # minutes at busy times — that's fine for this use case.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab, any time

permissions:
  contents: write # needed so the workflow can commit the updated data.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome (needed for the GSTN Advisory scraper)
        uses: browser-actions/setup-chrome@v1

      - name: Scrape and notify
        env:
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
        run: python scrape_and_notify.py

      - name: Commit updated data if changed
        run: |
          git config user.name "gst-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update GST/CBIC data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          # Pull-rebase before pushing, with a couple of retries — handles
          # the case where a manually-triggered run and the scheduled hourly
          # run happen to overlap and both try to push around the same time.
          for i in 1 2 3; do
            git pull --rebase && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
